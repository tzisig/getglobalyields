name: Redirect Check

on:
  push:
    paths:
      - 'public/_redirects'
  pull_request:
    paths:
      - 'public/_redirects'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python check_redirects.py public/_redirects