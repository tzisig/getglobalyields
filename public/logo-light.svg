<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Get Global Yields logo">
  <defs>
    <linearGradient id="ggygold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D9BF6A"/>
      <stop offset="1" stop-color="#B78F2E"/>
    </linearGradient>
    <linearGradient id="ggyteal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22B8B2"/>
      <stop offset="1" stop-color="#0E7F86"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1F2A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(70 55)" filter="url(#softShadow)">
    <!-- outer ring -->
    <circle cx="95" cy="95" r="82" stroke="url(#ggygold)" stroke-width="10"/>
    <circle cx="95" cy="95" r="66" stroke="#0B1F2A" stroke-opacity="0.14" stroke-width="2"/>

    <!-- globe grid -->
    <circle cx="95" cy="95" r="56" stroke="#0B1F2A" stroke-opacity="0.9" stroke-width="3"/>
    <path d="M39 95C55 70 73 58 95 58C117 58 135 70 151 95C135 120 117 132 95 132C73 132 55 120 39 95Z" stroke="#0B1F2A" stroke-opacity="0.85" stroke-width="2.6"/>
    <path d="M95 39C120 55 132 73 132 95C132 117 120 135 95 151C70 135 58 117 58 95C58 73 70 55 95 39Z" stroke="#0B1F2A" stroke-opacity="0.85" stroke-width="2.6"/>
    <path d="M95 39C83 55 77 74 77 95C77 116 83 135 95 151" stroke="#0B1F2A" stroke-opacity="0.65" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M95 39C107 55 113 74 113 95C113 116 107 135 95 151" stroke="#0B1F2A" stroke-opacity="0.65" stroke-width="2.2" stroke-linecap="round"/>

    <!-- compass needle -->
    <g transform="translate(95 95) rotate(-25)">
      <path d="M0 -56L10 -8L0 -16L-10 -8L0 -56Z" fill="url(#ggygold)"/>
      <path d="M0 56L10 8L0 16L-10 8L0 56Z" fill="url(#ggyteal)"/>
      <circle cx="0" cy="0" r="6.5" fill="#0B1F2A"/>
      <circle cx="0" cy="0" r="3" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(260 84)">
    <text x="0" y="0" fill="#0E7F86" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="0.5">
      GET GLOBAL
    </text>
    <text x="0" y="68" fill="#0B1F2A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="0.3">
      <tspan fill="#0B1F2A">Y</tspan><tspan fill="url(#ggygold)">IELDS</tspan>
    </text>
    <text x="2" y="110" fill="#50616B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="2.6">
      INVESTMENT OPPORTUNITIES
    </text>
  </g>
</svg>
