<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Global investing illustration</title>
<desc>A globe with stock chart and rising arrow representing global investing returns</desc>
<style>
  .ring { fill: none; stroke: #C9A84C; stroke-width: 0.8; opacity: 0.25; }
  .gridline { stroke: #C9A84C; stroke-width: 0.5; opacity: 0.12; }
  .chartline { fill: none; stroke: #C9A84C; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .chartfill { fill: #C9A84C; opacity: 0.08; }
  .dot { fill: #C9A84C; }
  .stat-box { fill: #112240; stroke: #C9A84C; stroke-width: 0.8; opacity: 0.95; }
  .stat-val { font-family: system-ui, sans-serif; font-weight: 700; font-size: 15px; fill: #C9A84C; }
  .stat-lbl { font-family: system-ui, sans-serif; font-size: 11px; fill: #94a3b8; }
  .land { fill: #1e3a5f; opacity: 0.7; }
  .ocean { fill: #0a192f; }
  .meridian { fill: none; stroke: #3a506b; stroke-width: 0.6; }
  .arrow-up { fill: none; stroke: #4ade80; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
</style>

